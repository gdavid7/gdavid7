name: Update pinned repo card
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Ensure output folder
        run: mkdir -p profile
      - name: Pin - cryptocode
        uses: stats-organization/github-readme-stats-action@v1.1.0
        with:
          card: pin
          options: username=gdavid7&repo=cryptocode&hide_border=true
          path: profile/pin-cryptocode.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update pinned repo card" || exit 0
          git push
